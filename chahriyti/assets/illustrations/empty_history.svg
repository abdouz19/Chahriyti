<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Calendar body -->
  <rect x="30" y="50" width="140" height="120" rx="10" ry="10" fill="#0D6E6E"/>
  <!-- Calendar header -->
  <rect x="30" y="50" width="140" height="35" rx="10" ry="10" fill="#094F4F"/>
  <rect x="30" y="70" width="140" height="15" fill="#094F4F"/>
