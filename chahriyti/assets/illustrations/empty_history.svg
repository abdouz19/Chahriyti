  <rect x="65" y="38" width="10" height="26" rx="5" ry="5" fill="#94A3B8"/>
  <rect x="125" y="38" width="10" height="26" rx="5" ry="5" fill="#94A3B8"/>
  <!-- List lines -->
  <rect x="48" y="105" width="50" height="8" rx="4" fill="#FFFFFF" opacity="0.8"/>
  <rect x="48" y="122" width="70" height="8" rx="4" fill="#FFFFFF" opacity="0.6"/>
  <rect x="48" y="139" width="60" height="8" rx="4" fill="#FFFFFF" opacity="0.4"/>
  <!-- Dot bullets -->
  <circle cx="40" cy="109" r="4" fill="#94A3B8"/>
  <circle cx="40" cy="126" r="4" fill="#94A3B8"/>
  <circle cx="40" cy="143" r="4" fill="#94A3B8"/>
</svg>
