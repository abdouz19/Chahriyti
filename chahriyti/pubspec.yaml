name: chahriyti
description: "شهريتي — Personal salary and expense management app for Algerian employees."
publish_to: 'none'
version: 1.0.0+6

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0

  # Navigation
  go_router: ^15.1.2

  # Database (Drift / SQLite)
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.32

  # Immutable Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Device & Security
  device_info_plus: ^11.4.0
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6

  # Charts
  fl_chart: ^0.69.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  smooth_page_indicator: ^1.2.0+3

  # Notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.0

  # Utilities
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  logger: ^2.5.0
  intl: ^0.20.2
  equatable: ^2.0.7

  # Splash & Launcher Icons
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.25.0
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/illustrations/
    - assets/animations/

flutter_launcher_icons:
  image_path: "assets/icons/CHAHRIYTI 512.png"
  image_path_android: "assets/icons/CHAHRIYTI 512.png"
  image_path_ios: "assets/icons/CHAHRIYTI 512.png"
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icons/CHAHRIYTI 512.png"

flutter_native_splash:
  image: "assets/icons/CHAHRIYTI png white.png"
  color: "#0D6E6E"
  color_dark: "#0D6E6E"
  android: true
  ios: true
  web: false
  android_gravity: center
  ios_content_mode: center
