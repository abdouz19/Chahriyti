name: chahriyti
description: "شهريتي — Personal salary and expense management app for Algerian employees."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0

  # Navigation
  go_router: ^15.1.2

  # Database (Drift / SQLite)
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.32

  # Immutable Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Device & Security
  device_info_plus: ^11.4.0
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  smooth_page_indicator: ^1.2.0+3

  # Utilities
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  logger: ^2.5.0
  intl: ^0.20.2
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.25.0
  freezed: ^3.0.0
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/illustrations/
    - assets/animations/
